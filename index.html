<body>
  <main class="page">
    <p class="title">Clique para visualizar o convite!</p>

    <div class="invite-area" id="inviteArea" role="button" tabindex="0" aria-label="Abrir convite">
      <div class="viewer-window" id="viewerWindow">
        <div class="frame-layer" id="frameLayer">
          <img id="frameImage" src="assets/01-envelope-fechado.png" alt="Convite de Val e Erick" />
        </div>

        <div class="scroll-layer" id="scrollLayer" aria-hidden="true">
          <img id="scrollImage" src="assets/04-convite-completo.png" alt="Convite completo de Val e Erick" />
        </div>

        <div class="tap-overlay" id="tapOverlay">✦ toque para abrir ✦</div>
      </div>
    </div>

    <button id="replayBtn" class="replay-btn" type="button" aria-label="Repetir animação" hidden>↻</button>

    <p class="signature">Com Carinho, Val e Erick.</p>
  </main>

  <script src="script.js"></script>
